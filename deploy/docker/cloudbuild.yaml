steps:
  # CPU image (ubuntu:24.04 base)
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - deploy/docker/Dockerfile
      - -t
      - us-central1-docker.pkg.dev/coderd/coder/llm-interpretability-bootcamp:latest
      - .

  # GPU image (nvidia/cuda base)
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - deploy/docker/Dockerfile
      - --build-arg
      - BASE_IMAGE=nvidia/cuda:12.6.3-cudnn-runtime-ubuntu24.04
      - -t
      - us-central1-docker.pkg.dev/coderd/coder/llm-interpretability-bootcamp:gpu
      - .

images:
  - us-central1-docker.pkg.dev/coderd/coder/llm-interpretability-bootcamp:latest
  - us-central1-docker.pkg.dev/coderd/coder/llm-interpretability-bootcamp:gpu

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
